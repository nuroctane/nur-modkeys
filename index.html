<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODKEYS — Keyboard Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      :root {
        --bg: #e9e8e6;
        --panel: #ffffff;
        --ink: #17171a;
        --ink2: #87878d;
        --ink3: #b4b4b8;
        --line: #e6e5e2;
        --line2: #dddcd8;
        --card: #f4f3f1;
        --card2: #eceae7;
        --chipA: #141416;
        --chipAtx: #ffffff;
        --side: #0c0c0e;
        --sideTx: #e9e9ec;
        --sideTx2: #78787e;
        --stageGlow: #f4f3f0;
        --shadowC: rgba(20, 20, 24, 0.1);
      }
      [data-theme="dark"] {
        --bg: #131315;
        --panel: #1c1c1f;
        --ink: #f0f0f2;
        --ink2: #93939b;
        --ink3: #5a5a60;
        --line: #2a2a2e;
        --line2: #333338;
        --card: #232327;
        --card2: #2a2a2f;
        --chipA: #f0f0f2;
        --chipAtx: #141416;
        --side: #0a0a0c;
        --sideTx: #ececef;
        --sideTx2: #6f6f76;
        --stageGlow: #1f1f23;
        --shadowC: rgba(0, 0, 0, 0.35);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          "Inter",
          "SF Pro Display",
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--ink);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        transition:
          background 0.35s ease,
          color 0.35s ease;
      }
      button {
        font-family: inherit;
        border: 0;
        background: none;
        cursor: pointer;
        color: inherit;
      }
      svg {
        display: block;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line2);
        border-radius: 8px;
      }

      /* ---------- app frame ---------- */
      .app {
        display: grid;
        grid-template-columns: 264px 1fr;
        height: 100vh;
        min-width: 1180px;
      }

      /* ---------- sidebar ---------- */
      .side {
        background: var(--side);
        color: var(--sideTx);
        display: flex;
        flex-direction: column;
        padding: 0 20px 22px;
        position: relative;
        z-index: 5;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 11px;
        height: 72px;
        flex: 0 0 auto;
      }
      .logo svg {
        color: var(--sideTx);
      }
      .logo b {
        font-size: 16.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
      }
      .sideLabel {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: var(--sideTx2);
        margin: 26px 6px 10px;
      }
      .snav {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .snav button {
        display: flex;
        align-items: center;
        gap: 13px;
        height: 52px;
        padding: 0 12px;
        border-radius: 11px;
        color: var(--sideTx);
        font-size: 14.5px;
        font-weight: 500;
        letter-spacing: 0.01em;
        transition: background 0.18s ease;
        text-align: left;
        width: 100%;
      }
      .snav button:hover {
        background: rgba(255, 255, 255, 0.055);
      }
      .snav button.on {
        background: rgba(255, 255, 255, 0.09);
      }
      .snav .ic {
        width: 20px;
        height: 20px;
        color: #a9a9b0;
        flex: 0 0 auto;
      }
      .snav button.on .ic {
        color: #fff;
      }
      .snav .meta {
        margin-left: auto;
        font-size: 13px;
        color: var(--sideTx2);
        font-weight: 600;
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        margin-left: auto;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      }
      .sideBottom {
        margin-top: auto;
      }
      .sum {
        font-size: 12.5px;
        color: var(--sideTx2);
        font-weight: 600;
        margin: 0 4px 6px;
      }
      .price {
        margin: 0 4px 16px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .price .cur {
        font-size: 19px;
        vertical-align: 16px;
        margin-right: 2px;
        font-weight: 700;
      }
      .price .int {
        font-size: 38px;
      }
      .price .dec {
        font-size: 16px;
        vertical-align: 16px;
        margin-left: 2px;
        font-weight: 700;
      }
      .cartBtn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 54px;
        background: #fff;
        color: #131316;
        border-radius: 13px;
        padding: 0 20px;
        font-size: 15px;
        font-weight: 700;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      .cartBtn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }
      .cartBtn:active {
        transform: translateY(0);
      }
      .saveRow {
        display: flex;
        align-items: center;
        gap: 11px;
        height: 46px;
        padding: 0 6px;
        margin-top: 8px;
        color: #b9b9c0;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        width: 100%;
        transition: color 0.18s;
      }
      .saveRow:hover {
        color: #fff;
      }

      /* ---------- main / topbar ---------- */
      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .topbar {
        height: 72px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        padding: 0 28px;
        border-bottom: 1px solid var(--line);
        background: var(--bg);
        transition:
          background 0.35s,
          border-color 0.35s;
      }
      .tnav {
        display: flex;
        gap: 34px;
        margin: 0 auto;
        height: 100%;
      }
      .tnav button {
        position: relative;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink2);
        height: 100%;
        transition: color 0.18s;
      }
      .tnav button:hover {
        color: var(--ink);
      }
      .tnav button.on {
        color: var(--ink);
      }
      .tnav button.on::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 16px;
        height: 2px;
        border-radius: 2px;
        background: var(--ink);
      }
      .topIcons {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }
      .iconBtn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        position: relative;
        transition: background 0.18s;
      }
      .iconBtn:hover {
        background: var(--card);
      }
      .badge {
        position: absolute;
        top: 2px;
        right: 0;
        min-width: 17px;
        height: 17px;
        border-radius: 9px;
        background: var(--ink);
        color: var(--panel);
        font-size: 10.5px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        transform-origin: center;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1.5px solid var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        background: transparent;
      }
      .acctMenu {
        position: absolute;
        top: 64px;
        right: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
        padding: 8px;
        min-width: 200px;
        z-index: 60;
        display: none;
      }
      .acctMenu.open {
        display: block;
        animation: pop 0.18s ease;
      }
      .acctMenu .who {
        padding: 10px 12px 8px;
        font-size: 12px;
        color: var(--ink2);
        border-bottom: 1px solid var(--line);
        margin-bottom: 6px;
      }
      .acctMenu button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 9px 12px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 500;
      }
      .acctMenu button:hover {
        background: var(--card);
      }
      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ---------- content grid ---------- */
      .content {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr 314px;
        grid-template-rows: 1fr auto;
        gap: 0 26px;
        padding: 0 28px 18px;
      }
      .stageCol {
        grid-row: 1;
        grid-column: 1;
        position: relative;
        min-width: 0;
        min-height: 0;
      }
      .stage {
        position: absolute;
        inset: 0;
        cursor: grab;
      }
      .stage.grabbing {
        cursor: grabbing;
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          58% 52% at 50% 44%,
          var(--stageGlow),
          transparent 72%
        );
        pointer-events: none;
        transition: background 0.35s;
      }
      #gl {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* pills */
      .pills {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 2px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 13px;
        padding: 4px;
        z-index: 4;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      }
      .pills {
        isolation: isolate;
      }
      .pills button {
        position: relative;
        z-index: 2;
        height: 36px;
        padding: 0 19px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 600;
        color: var(--ink2);
        transition: color 0.25s;
      }
      .pills button.on {
        color: var(--chipAtx);
      }
      #pillInd {
        position: absolute;
        top: 4px;
        left: 0;
        height: 36px;
        border-radius: 9px;
        background: var(--chipA);
        z-index: 1;
        transition:
          transform 0.38s cubic-bezier(0.6, 0.05, 0.2, 1),
          width 0.38s cubic-bezier(0.6, 0.05, 0.2, 1);
      }

      /* toolbar */
      .toolbar {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 2px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 13px;
        padding: 4px;
        z-index: 4;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      }
      .toolbar button {
        width: 56px;
        height: 42px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        transition:
          background 0.18s,
          color 0.18s;
      }
      .toolbar button:hover {
        background: var(--card);
      }
      .toolbar button.on {
        background: var(--chipA);
        color: var(--chipAtx);
      }
      .toolbar button .spin {
        transition: transform 0.8s cubic-bezier(0.5, 0.05, 0.2, 1);
      }

      /* ---------- featured ---------- */
      .featured {
        grid-row: 2;
        grid-column: 1;
        padding-top: 14px;
        min-width: 0;
      }
      .fhead {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }
      .fhead h3 {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--ink2);
      }
      .farrows {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .farrows button {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--line2);
        background: var(--panel);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        transition:
          background 0.18s,
          transform 0.18s;
      }
      .farrows button:hover {
        background: var(--card);
      }
      .farrows button:active {
        transform: scale(0.94);
      }
      .btrack {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .btrack::-webkit-scrollbar {
        display: none;
      }
      .bcard {
        flex: 0 0 182px;
        background: var(--card);
        border: 1.5px solid transparent;
        border-radius: 15px;
        padding: 9px 9px 12px;
        position: relative;
        transition:
          border-color 0.2s,
          transform 0.2s;
        text-align: center;
      }
      .bcard:hover {
        transform: translateY(-2px);
      }
      .bcard.on {
        border-color: var(--ink);
        background: var(--panel);
      }
      .bcard .img {
        height: 106px;
        border-radius: 10px;
        background: var(--card2);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }
      .bcard .img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .bcard .nm {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
      }
      .bcard .chk {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--ink);
        color: var(--panel);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .bcard.on .chk {
        display: flex;
      }

      /* ---------- right panel ---------- */
      .rpanel {
        grid-row: 1/3;
        grid-column: 2;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        margin: 16px 0 4px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        transition:
          background 0.35s,
          border-color 0.35s;
      }
      .rpHead {
        padding: 22px 24px 16px;
        border-bottom: 1px solid var(--line);
      }
      .rpHead h2 {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.16em;
      }
      .rpBody {
        padding: 20px 24px 24px;
        overflow-y: auto;
        flex: 1;
      }
      .grp {
        margin-bottom: 22px;
      }
      .glabel {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink2);
        margin-bottom: 10px;
      }
      .gname {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--ink);
        margin: -4px 0 10px;
      }
      .rowFlex {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .profBtn {
        width: 60px;
        height: 46px;
        border: 1px solid var(--line2);
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        transition: all 0.2s;
      }
      .profBtn:hover {
        border-color: var(--ink3);
      }
      .profBtn.on {
        background: var(--chipA);
        border-color: var(--chipA);
        color: var(--chipAtx);
      }
      .chip {
        height: 40px;
        padding: 0 18px;
        border: 1px solid var(--line2);
        border-radius: 11px;
        font-size: 13.5px;
        font-weight: 600;
        color: var(--ink);
        transition: all 0.2s;
      }
      .chip:hover {
        border-color: var(--ink3);
      }
      .chip.on {
        background: var(--chipA);
        border-color: var(--chipA);
        color: var(--chipAtx);
      }
      .sw {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        position: relative;
        border: none;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
        transition: transform 0.18s;
      }
      .sw:hover {
        transform: scale(1.08);
      }
      .sw.on::after {
        content: "";
        position: absolute;
        inset: -5px;
        border: 2px solid var(--ink);
        border-radius: 50%;
      }
      .preview {
        background: var(--card);
        border-radius: 15px;
        height: 198px;
        position: relative;
        overflow: hidden;
        margin-bottom: 16px;
      }
      .kc {
        position: absolute;
        border-radius: 9px;
        font-size: 10px;
        font-weight: 700;
        padding: 7px 0 0 8px;
        letter-spacing: 0.02em;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.32),
          inset 0 -9px 0 rgba(0, 0, 0, 0.16),
          0 12px 22px rgba(0, 0, 0, 0.2);
        transform: rotate(-15deg);
      }
      .libBtn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        width: 100%;
        height: 48px;
        border: 1px solid var(--line2);
        border-radius: 13px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .libBtn:hover {
        border-color: var(--ink);
        background: var(--card);
      }
      .optCard {
        display: flex;
        align-items: center;
        gap: 13px;
        width: 100%;
        text-align: left;
        border: 1.5px solid var(--line2);
        border-radius: 13px;
        padding: 13px 15px;
        margin-bottom: 9px;
        transition: all 0.2s;
      }
      .optCard:hover {
        border-color: var(--ink3);
      }
      .optCard.on {
        border-color: var(--ink);
      }
      .optCard .t1 {
        font-size: 14px;
        font-weight: 700;
      }
      .optCard .t2 {
        font-size: 12px;
        color: var(--ink2);
        margin-top: 2px;
      }
      .optCard .pr {
        margin-left: auto;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--ink2);
        white-space: nowrap;
      }
      .optCard .cdot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        flex: 0 0 auto;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }
      .togRow {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 2px;
        border-bottom: 1px solid var(--line);
      }
      .togRow:last-child {
        border-bottom: 0;
      }
      .togRow .t1 {
        font-size: 14px;
        font-weight: 600;
      }
      .togRow .t2 {
        font-size: 12px;
        color: var(--ink2);
        margin-top: 2px;
      }
      .tog {
        margin-left: auto;
        width: 44px;
        height: 26px;
        border-radius: 13px;
        background: var(--line2);
        position: relative;
        transition: background 0.22s;
        flex: 0 0 auto;
      }
      .tog::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        transition: transform 0.22s cubic-bezier(0.5, 0.05, 0.2, 1.3);
      }
      .tog.on {
        background: var(--ink);
      }
      .tog.on::after {
        transform: translateX(18px);
      }
      .slider {
        width: 100%;
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--line2);
        outline: none;
      }
      .slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--ink);
        cursor: pointer;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      }
      .hint {
        font-size: 11.5px;
        color: var(--ink3);
        margin-top: 8px;
        line-height: 1.5;
      }

      /* ---------- drawer / modal / toast / loader ---------- */
      .scrim {
        position: fixed;
        inset: 0;
        background: rgba(12, 12, 16, 0.42);
        z-index: 80;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .scrim.open {
        opacity: 1;
        pointer-events: auto;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 392px;
        background: var(--panel);
        z-index: 90;
        transform: translateX(104%);
        transition: transform 0.42s cubic-bezier(0.65, 0.05, 0.2, 1);
        display: flex;
        flex-direction: column;
        box-shadow: -20px 0 60px rgba(0, 0, 0, 0.18);
      }
      .drawer.open {
        transform: none;
      }
      .dHead {
        display: flex;
        align-items: center;
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
      }
      .dHead h3 {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .dHead button {
        margin-left: auto;
      }
      .dItems {
        flex: 1;
        overflow-y: auto;

          for (let i = 0; i < pos.count; i++) {
            v.fromBufferAttribute(pos, i);
            const t = THREE.MathUtils.clamp((v.y + bev) / (topY + bev), 0, 1);
            const s = 1 - (1 - p.taper) * t;
            v.x *= s;
            v.z *= s;
            if (v.y > p.h * 0.82) {
              /* cylindrical-ish dish */
              const nx = v.x / (hw * p.taper),
                nz = v.z / (hd * p.taper);
              const rr = Math.min(1, nx * nx + nz * nz);
              v.y -= p.dish * (1 - rr);
            }
            pos.setXYZ(i, v.x, v.y, v.z);
          }
          g.computeVertexNormals();
          capGeoCache.set(key, g);
          return g;
        }

        /* the Claude mascot: Anthropic sunburst, drawn as a keycap legend */
        function drawClaudeMark(g, W, H, color) {
          const cx = W / 2,
            cy = H / 2,
            R = Math.min(W, H) * 0.34;
          g.save();
          g.strokeStyle = color;
          g.fillStyle = color;
          g.lineCap = "round";
          const spokes = 11;
          for (let i = 0; i < spokes; i++) {
            const a = (i / spokes) * Math.PI * 2 - Math.PI / 2;
            g.lineWidth = R * 0.13;
            g.beginPath();
            g.moveTo(cx + Math.cos(a) * R * 0.3, cy + Math.sin(a) * R * 0.3);
            g.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
            g.stroke();
          }
          g.beginPath();
          g.arc(cx, cy, R * 0.17, 0, Math.PI * 2);
          g.fill();
          g.restore();
        }

        /* the Gemini mascot: four-pointed spark with concave sides */
        function drawGeminiMark(g, W, H, color) {
          const cx = W / 2,
            cy = H / 2,
            R = Math.min(W, H) * 0.42,
            ctrl = R * 0.16;
          const pts = [
            [0, -R],
            [R, 0],
            [0, R],
            [-R, 0],
          ];
          g.save();
          g.fillStyle = color;
          g.beginPath();
          g.moveTo(cx + pts[0][0], cy + pts[0][1]);
          for (let i = 0; i < 4; i++) {
            const nxt = pts[(i + 1) % 4],
              mx = (pts[i][0] + nxt[0]) / 2,
              my = (pts[i][1] + nxt[1]) / 2,
              len = Math.hypot(mx, my) || 1;
            g.quadraticCurveTo(
              cx + (mx / len) * ctrl,
              cy + (my / len) * ctrl,
              cx + nxt[0],
              cy + nxt[1],
            );
          }
          g.closePath();
          g.fill();
          g.restore();
        }

        /* legend textures, cached per label+width+color. Super-sampled 2x with a
           heavier weight so small legends stay crisp instead of washing out. */
        const legendCache = new Map();
        const S = 2;
        function legendTex(label, wU, fg, mark) {
          const key = label + "|" + wU + "|" + fg + (mark ? "|" + mark : "");
          if (legendCache.has(key)) return legendCache.get(key);
          const W = Math.max(128, Math.round(128 * wU)) * S,
            H = 128 * S;
          const c = document.createElement("canvas");
          c.width = W;
          c.height = H;
          const g = c.getContext("2d");
          if (mark === "gemini") {
            drawGeminiMark(g, W, H, fg);
          } else if (mark === "claude") {
            drawClaudeMark(g, W, H, fg);
          } else {
            g.fillStyle = fg;
            g.textBaseline = "top";
            const lines = label.split("\n"),
              pad = 17 * S;
            const F = '"Inter","Segoe UI",Arial,sans-serif';
            if (lines.length === 2) {
              g.font = "700 " + 27 * S + "px " + F;
              g.fillText(lines[0], pad, pad);
              g.fillText(lines[1], pad, pad + 44 * S);
            } else {
              let fs = 29 * S;
              g.font = "700 " + fs + "px " + F;
              while (g.measureText(label).width > W - pad * 2 && fs > 15 * S) {
                fs--;
                g.font = "700 " + fs + "px " + F;
              }
              g.fillText(label, pad, pad + 4 * S);
            }
          }
          const t = new THREE.CanvasTexture(c);
          t.anisotropy = renderer.capabilities.getMaxAnisotropy();
          t.encoding = THREE.sRGBEncoding;
          legendCache.set(key, t);
          return t;
        }
        /* the Esc key carries a brand mascot instead of a text legend for the
           AI-brand colorways; returns the mark type or null */
        const markFor = (label) =>
          label === "Esc" &&
          (state.colorway === "claude" || state.colorway === "gemini")
            ? state.colorway
            : null;

        /* ---------------- board construction ---------------- */
        const caseGroup = new THREE.Group(),
          capsGroup = new THREE.Group(),
          switchGroup = new THREE.Group(),
          knobGroup = new THREE.Group();
        root.add(caseGroup, capsGroup, switchGroup, knobGroup);
        const CAP_Y = 1.1;
        let plateMesh = null,
          plateBaseY = 0.6,
          knobBaseY = 1.04,
          boardW = 0,
          boardD = 0;

        /* ground: real shadow + faked AO + glow pool */
        const shadowPlane = new THREE.Mesh(
          new THREE.PlaneGeometry(46, 46),
          new THREE.ShadowMaterial({ opacity: 0.16 }),
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = 0.002;
        shadowPlane.receiveShadow = true;
        root.add(shadowPlane);
        const aoTex = (() => {
          const c = document.createElement("canvas");
          c.width = c.height = 256;
          const g = c.getContext("2d");
          const gr = g.createRadialGradient(128, 128, 10, 128, 128, 126);
          gr.addColorStop(0, "rgba(10,10,14,.42)");
          gr.addColorStop(0.55, "rgba(10,10,14,.20)");
          gr.addColorStop(1, "rgba(10,10,14,0)");
          g.fillStyle = gr;
          g.fillRect(0, 0, 256, 256);
          return new THREE.CanvasTexture(c);
        })();
        const aoPlane = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 1),
          new THREE.MeshBasicMaterial({
            map: aoTex,
            transparent: true,
            depthWrite: false,
          }),
        );
        aoPlane.rotation.x = -Math.PI / 2;
        aoPlane.position.y = 0.004;
        root.add(aoPlane);
        const glowPlane = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 1),
          glowMat,
        );
        glowPlane.rotation.x = -Math.PI / 2;
        glowPlane.position.y = 0.006;
        root.add(glowPlane);

        function disposeGroup(gr) {
          while (gr.children.length) {
            const o = gr.children.pop();
            o.traverse((n) => {
              if (n.geometry && !capGeoCache.has(n.userData.gk))
                n.geometry.dispose();
            });
          }
        }

        function buildCase() {
          disposeGroup(caseGroup);
          disposeGroup(knobGroup);
          const L = LAYOUTS[state.layout];
          boardW = L.total + 1.0;
          boardD = 6.0;
          /* bottom slab */
          const bottom = new THREE.Mesh(
            extrudeFlat(rrect(boardW, boardD, 0.55), 0.58, 0.04),
            matCase,
          );
          bottom.position.y = 0.04;
          bottom.castShadow = bottom.receiveShadow = true;
          caseGroup.add(bottom);
          /* wall ring with cavity */
          const wallShape = rrect(boardW, boardD, 0.55);
          wallShape.holes.push(rrhole(boardW - 0.72, boardD - 0.72, 0.34));
          const wall = new THREE.Mesh(extrudeFlat(wallShape, 0.42), matCase);
          wall.position.y = 0.62;
          wall.castShadow = wall.receiveShadow = true;
          caseGroup.add(wall);
          /* plate */
          plateMesh = new THREE.Mesh(
            extrudeFlat(rrect(boardW - 0.8, boardD - 0.8, 0.3), 0.1),
            matPlate,
          );
          plateMesh.position.y = plateBaseY;
          plateMesh.receiveShadow = true;
          caseGroup.add(plateMesh);
          /* RGB skirt */
          const skirt = new THREE.Mesh(
            extrudeFlat(rrect(boardW + 0.05, boardD + 0.05, 0.57), 0.12),
            skirtMat,
          );
          skirt.position.y = 0.015;
          caseGroup.add(skirt);
          /* rotary knob */
          if (L.knob) {
            const body = new THREE.CylinderGeometry(
              0.42,
              0.42,
              0.32,
              72,
              1,
              false,
            );
            const bp = body.attributes.position;
            for (let i = 0; i < bp.count; i++) {
              const x = bp.getX(i),
                z = bp.getZ(i),
                r = Math.hypot(x, z);
              if (r > 0.4) {
                const a = Math.atan2(z, x),
                  kk = 1 + 0.02 * Math.sign(Math.sin(a * 28));
                bp.setX(i, x * kk);
                bp.setZ(i, z * kk);
              }
            }
            body.computeVertexNormals();
            const bm = new THREE.Mesh(body, matKnob);
            bm.position.y = 0.16;
            bm.castShadow = true;
            const top = new THREE.Mesh(
              new THREE.CylinderGeometry(0.34, 0.4, 0.07, 48),
              matKnob,
            );
            top.position.y = 0.35;
            const dotm = new THREE.Mesh(
              new THREE.CylinderGeometry(0.035, 0.035, 0.02, 12),
              new THREE.MeshBasicMaterial({ color: sRGB(0xdddde2) }),
            );
            dotm.position.set(0.24, 0.39, 0);
            knobGroup.add(bm, top, dotm);
            knobGroup.position.set(15.75 - L.total / 2, knobBaseY, -2);
            knobGroup.traverse((n) => (n.userData.isKnob = true));
          }
          knobGroup.visible = !!L.knob && state.extras.knob;
          aoPlane.scale.set(boardW * 1.3, boardD * 1.7, 1);
          glowPlane.scale.set(boardW * 1.9, boardD * 2.9, 1);
        }

        function makeSwitch(x, z) {
          const g = new THREE.Group();
          const body = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.3, 0.6),
            matSwBody,
          );
          body.position.y = 0.85;
          const s1 = new THREE.Mesh(
            new THREE.BoxGeometry(0.13, 0.17, 0.34),
            matStem,
          );
          const s2 = new THREE.Mesh(
            new THREE.BoxGeometry(0.34, 0.17, 0.13),
            matStem,
          );
          s1.position.y = s2.position.y = 1.06;
          g.add(body, s1, s2);
          g.position.set(x, 0, z);
          return g;
        }

        function buildKeys() {
          disposeGroup(capsGroup);
          disposeGroup(switchGroup);
          const L = LAYOUTS[state.layout],
            rows = L.rows(),
            center = L.total / 2,
            prof = PROFILES[state.profile];
          const cw = COLORWAYS[state.colorway];
          rows.forEach((row, ri) => {
            let cur = 0;
            row.forEach((keyDef, ci) => {
              const start = keyDef.x !== undefined ? keyDef.x : cur;
              const cx = start + keyDef.w / 2 - center,
                cz = ri - 2;
              cur = start + keyDef.w;
              const mesh = new THREE.Mesh(
                capGeo(keyDef.w, state.profile),
                capMats[keyDef.r],
              );
              mesh.userData.gk = keyDef.w + "|" + state.profile;
              mesh.castShadow = mesh.receiveShadow = true;
              mesh.position.set(cx, CAP_Y, cz);
              mesh.rotation.x = prof.tilt[ri];
              mesh.userData = Object.assign(mesh.userData, {
                isCap: true,
                baseY: CAP_Y,
                row: ri,
                col: ci,
                label: keyDef.l,
                w: keyDef.w,
                role: keyDef.r,
              });
              if (keyDef.l) {
                const topW = (keyDef.w - GAP) * prof.taper * 0.92,
                  topD = (1 - GAP) * prof.taper * 0.82;
                const leg = new THREE.Mesh(
                  new THREE.PlaneGeometry(topW, topD),
                  new THREE.MeshBasicMaterial({
                    map: legendTex(
                      keyDef.l,
                      keyDef.w,
                      cw[keyDef.r].fg,
                      markFor(keyDef.l),
                    ),
                    transparent: true,
                    depthWrite: false,
                  }),
                );
                leg.material.toneMapped = false;
                leg.rotation.x = -Math.PI / 2;
                leg.position.y = prof.h + 0.052;
                leg.renderOrder = 2;
                mesh.add(leg);
                mesh.userData.legend = leg;
              }
              capsGroup.add(mesh);
              switchGroup.add(makeSwitch(cx, cz));
            });
          });
        }
        function rebuildBoard() {
          buildCase();
          buildKeys();
        }
        function refreshLegends() {
          const cw = COLORWAYS[state.colorway];
          capsGroup.children.forEach((c) => {
            if (c.userData.legend)
              c.userData.legend.material.map = legendTex(
                c.userData.label,
                c.userData.w,
                cw[c.userData.role].fg,
                markFor(c.userData.label),
              );
          });
        }

        /* ---------------- camera rig with inertia ---------------- */
        const ctrl = {
          theta: -0.58,
          phi: 1.02,
          radius: 10.6,
          target: new THREE.Vector3(0, -0.08, 0),
          vT: 0,
          vP: 0,
          apply() {
            this.phi = THREE.MathUtils.clamp(this.phi, 0.06, 1.44);
            this.radius = THREE.MathUtils.clamp(this.radius, 5.5, 17);
            const sp = Math.sin(this.phi);
            camera.position.set(
              this.target.x + this.radius * sp * Math.sin(this.theta),
              this.target.y + this.radius * Math.cos(this.phi),
              this.target.z + this.radius * sp * Math.cos(this.theta),
            );
            camera.lookAt(this.target);
          },
        };
        const VIEWS = {
          "3d": { theta: -0.58, phi: 1.02, radius: 10.6, ty: -0.08 },
          explode: { theta: -0.34, phi: 0.82, radius: 12.6, ty: 0.42 },
          top: { theta: -0.02, phi: 0.07, radius: 10.8, ty: 0 },
          side: { theta: Math.PI / 2, phi: 1.34, radius: 9.6, ty: 0.05 },
          front: { theta: 0, phi: 1.3, radius: 9.9, ty: 0.1 },
        };
        function flyTo(v, dur) {
          ctrl.vT = ctrl.vP = 0;
          /* unwrap theta so we always take the short way around */
          const twoPi = Math.PI * 2;
          let dT = (v.theta - ctrl.theta) % twoPi;
          if (dT > Math.PI) dT -= twoPi;
          if (dT < -Math.PI) dT += twoPi;
          gsap.to(ctrl, {
            theta: ctrl.theta + dT,
            phi: v.phi,
            radius: v.radius,
            duration: dur || 1.15,
            ease: "power3.inOut",
            overwrite: "auto",
          });
          gsap.to(ctrl.target, {
            y: v.ty,
            duration: dur || 1.15,
            ease: "power3.inOut",
            overwrite: "auto",
          });
        }

        /* pointer interaction: orbit, pan, pinch, knob drag, cap hover */
        const ray = new THREE.Raycaster(),
          ndc = new THREE.Vector2();
        let pointers = new Map(),
          dragMode = null,
          lastX = 0,
          lastY = 0,
          downX = 0,
          downY = 0,
          pinchD = 0,
          hoverCap = null;
        function pick(list, ev) {
          const r = canvas.getBoundingClientRect();
          ndc.set(
            ((ev.clientX - r.left) / r.width) * 2 - 1,
            -((ev.clientY - r.top) / r.height) * 2 + 1,
          );
          ray.setFromCamera(ndc, camera);
          const hits = ray.intersectObjects(list, true);
          return hits.length ? hits[0].object : null;
        }
        function capOf(o) {
          while (o && !o.userData.isCap) o = o.parent;
          return o;
        }
        canvas.addEventListener("pointerdown", (ev) => {
          canvas.setPointerCapture(ev.pointerId);
          pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
          lastX = downX = ev.clientX;
          lastY = downY = ev.clientY;
          if (pointers.size === 2) {
            const p = [...pointers.values()];
            pinchD = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
            dragMode = "pinch";
            return;
          }
          const hitKnob = pick(knobGroup.visible ? knobGroup.children : [], ev);
          if (hitKnob) {
            dragMode = "knob";
            return;
          }
          dragMode =
            state.tool === "pan" ||
            ev.button === 1 ||
            ev.button === 2 ||
            ev.shiftKey
              ? "pan"
              : "orbit";
          stage.classList.add("grabbing");
        });
        canvas.addEventListener("pointermove", (ev) => {
          if (pointers.has(ev.pointerId))
            pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
          const dx = ev.clientX - lastX,
            dy = ev.clientY - lastY;
          lastX = ev.clientX;
          lastY = ev.clientY;
          if (dragMode === "pinch" && pointers.size === 2) {
            const p = [...pointers.values()];
            const d = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
            ctrl.radius *= pinchD / (d || 1);
            pinchD = d;
            return;
          }
          if (dragMode === "knob") {
            knobGroup.rotation.y -= dx * 0.02;
            const b = THREE.MathUtils.clamp(
              uni.uBright.value + dx * 0.004,
              0.1,
              1.5,
            );
            uni.uBright.value = b;
            state.light.bright = b;
            const sl = document.querySelector("#brightSlider");
            if (sl) sl.value = b;
            return;
          }
          if (dragMode === "orbit") {
            ctrl.theta -= dx * 0.0052;
            ctrl.phi -= dy * 0.0052;
            ctrl.vT = -dx * 0.0052;
            ctrl.vP = -dy * 0.0052;
            return;
          }
          if (dragMode === "pan") {
            const f = ctrl.radius * 0.0012;
            const right = new THREE.Vector3().setFromMatrixColumn(
              camera.matrix,
              0,
            );
            const up = new THREE.Vector3().setFromMatrixColumn(
              camera.matrix,
              1,
            );
            ctrl.target
              .addScaledVector(right, -dx * f)
              .addScaledVector(up, dy * f);
            return;
          }
          /* hover states */
          const overKnob = knobGroup.visible && pick(knobGroup.children, ev);
          const hit = overKnob ? null : capOf(pick(capsGroup.children, ev));
          canvas.style.cursor = overKnob ? "ew-resize" : hit ? "pointer" : "";
          if (hit !== hoverCap) {
            if (hoverCap && !state.exploded)
              gsap.to(hoverCap.position, {
                y: hoverCap.userData.baseY,
                duration: 0.35,
                ease: "power2.out",
                overwrite: "auto",
              });
            hoverCap = hit;
            if (hoverCap && !state.exploded)
              gsap.to(hoverCap.position, {
                y: hoverCap.userData.baseY + 0.055,
                duration: 0.3,
                ease: "power2.out",
                overwrite: "auto",
              });
          }
        });
        function endPointer(ev) {
          pointers.delete(ev.pointerId);
          stage.classList.remove("grabbing");
          const moved = Math.hypot(ev.clientX - downX, ev.clientY - downY);
          if (dragMode === "orbit" && moved < 5) {
            const hit = capOf(pick(capsGroup.children, ev));
            if (hit && !state.exploded) {
              playSwitch(SWITCHES[state.sw].sound);
              gsap
                .timeline()
                .to(hit.position, {
                  y: hit.userData.baseY - 0.07,
                  duration: 0.07,
                  ease: "power2.in",
                })
                .to(hit.position, {
                  y: hit.userData.baseY + 0.055,
                  duration: 0.22,
                  ease: "back.out(3)",
                });
            }
          }
          dragMode = null;
        }
        canvas.addEventListener("pointerup", endPointer);
        canvas.addEventListener("pointercancel", endPointer);
        canvas.addEventListener("contextmenu", (ev) => ev.preventDefault());
        canvas.addEventListener(
          "wheel",
          (ev) => {
            ev.preventDefault();
            ctrl.radius *= 1 + ev.deltaY * 0.0011;
          },
          { passive: false },
        );

        /* ---------------- explode ---------------- */
        function setExplode(on) {
          state.exploded = on;
          capsGroup.children.forEach((c) => {
            gsap.to(c.position, {
              y: c.userData.baseY + (on ? 1.0 + c.userData.row * 0.16 : 0),
              duration: 0.95,
              delay:
                (c.userData.col * 0.012 + c.userData.row * 0.055) *
                (on ? 1 : 0.5),
              ease: "power3.inOut",
              overwrite: "auto",
            });
          });
          if (plateMesh)
            gsap.to(plateMesh.position, {
              y: plateBaseY + (on ? 0.4 : 0),
              duration: 0.9,
              ease: "power3.inOut",
              delay: on ? 0.15 : 0,
            });
          gsap.to(knobGroup.position, {
            y: knobBaseY + (on ? 0.85 : 0),
            duration: 0.9,
            ease: "power3.inOut",
            delay: on ? 0.2 : 0,
          });
        }
        function setView(v) {
          state.view = v;
          const btns = [...$("pills").querySelectorAll("button")];
          btns.forEach((b) => b.classList.toggle("on", b.dataset.view === v));
          const act = btns.find((b) => b.dataset.view === v),
            ind = $("pillInd");
          ind.style.width = act.offsetWidth + "px";
          ind.style.transform = "translateX(" + (act.offsetLeft - 4) + "px)";
          const wantExplode = v === "explode";
          if (wantExplode !== state.exploded) setExplode(wantExplode);
          flyTo(VIEWS[v]);
        }

        /* ---------------- render loop ---------------- */
        const clock = new THREE.Clock();
        function tick() {
          requestAnimationFrame(tick);
          uni.uTime.value = clock.getElapsedTime();
          /* orbit inertia */
          if (
            !dragMode &&
            (Math.abs(ctrl.vT) > 1e-4 || Math.abs(ctrl.vP) > 1e-4)
          ) {
            ctrl.theta += ctrl.vT;
            ctrl.phi += ctrl.vP;
            ctrl.vT *= 0.9;
            ctrl.vP *= 0.9;
          }
          ctrl.apply();
          renderer.render(scene, camera);
        }
        function resize() {
          const r = stage.getBoundingClientRect();
          renderer.setSize(r.width, r.height, false);
          camera.aspect = r.width / r.height;
          camera.updateProjectionMatrix();
        }
        new ResizeObserver(resize).observe(stage);

        /* ---------------- instant apply (thumbnails + presets core) ---------------- */
        function applyInstant(s) {
          if (s.colorway) {
            const cw = COLORWAYS[s.colorway];
            matAlpha.color.copy(sRGB(cw.a.bg));
            matMod.color.copy(sRGB(cw.m.bg));
            matAccent.color.copy(sRGB(cw.x.bg));
            state.colorway = s.colorway;
            refreshLegends();
          }
          if (s.caseColor) {
            matCase.color.copy(sRGB(CASES[s.caseColor].c));
            state.caseColor = s.caseColor;
          }
          if (s.finish) {
            const f = FINISHES[s.finish];
            matCase.metalness = f.metal;
            matCase.roughness = f.rough;
            matCase.clearcoat = f.cc;
            state.finish = s.finish;
          }
          if (s.plate) {
            matPlate.color.copy(sRGB(PLATES[s.plate].c));
            state.plate = s.plate;
          }
          if (s.sw) {
            matStem.color.copy(sRGB(SWITCHES[s.sw].dot));
            state.sw = s.sw;
          }
          if (s.material) {
            const m = MATERIALS[s.material];
            [matAlpha, matMod, matAccent].forEach((mm) => {
              mm.roughness = m.rough;
              mm.clearcoat = m.cc;
              mm.clearcoatRoughness = m.ccr;
              mm.bumpScale = m.bump;
              mm.envMapIntensity = m.env;
            });
            state.material = s.material;
          }
          if (s.light) {
            state.light = Object.assign({}, state.light, s.light);
            applyLight();
          }
          if (s.extras) {
            state.extras = Object.assign({}, state.extras, s.extras);
            knobGroup.visible = LAYOUTS[state.layout].knob && state.extras.knob;
          }
        }
        function applyLight() {
          const modes = { wave: 0, static: 1, breathe: 2, off: 3 };
          uni.uMode.value = modes[state.light.mode];
          uni.uColor.value.set(state.light.color);
          uni.uBright.value = state.light.bright;
          const on = state.light.mode !== "off";
          caseGroup.children.forEach((c) => {
            if (c.material === skirtMat) c.visible = on;
          });
          glowPlane.visible = on;
        }
        function stateSlice() {
          return JSON.parse(
            JSON.stringify({
              colorway: state.colorway,
              caseColor: state.caseColor,
              finish: state.finish,
              plate: state.plate,
              sw: state.sw,
              material: state.material,
              light: state.light,
              extras: state.extras,
            }),
          );
        }
        function genThumbs() {
          const snap = stateSlice();
          const r = stage.getBoundingClientRect();
          renderer.setPixelRatio(1);
          renderer.setSize(460, 272, false);
          camera.aspect = 460 / 272;
          camera.updateProjectionMatrix();
          const sc = {
            theta: ctrl.theta,
            phi: ctrl.phi,
            radius: ctrl.radius,
            ty: ctrl.target.y,
          };
          ctrl.theta = VIEWS["3d"].theta;
          ctrl.phi = VIEWS["3d"].phi;
          ctrl.radius = 11.4;
          ctrl.target.y = -0.08;
          ctrl.apply();
          uni.uTime.value = 2.2;
          PRESETS.forEach((p) => {
            applyInstant(p.s);
            renderer.render(scene, camera);
            thumbs[p.id] = renderer.domElement.toDataURL("image/png");
          });
          applyInstant(snap);
          ctrl.theta = sc.theta;
          ctrl.phi = sc.phi;
          ctrl.radius = sc.radius;
          ctrl.target.y = sc.ty;
          renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
          renderer.setSize(r.width, r.height, false);
          camera.aspect = r.width / r.height;
          camera.updateProjectionMatrix();
        }

        /* ---------------- animated state application ---------------- */
        function tweenColor(mat, hex, d) {
          const c = sRGB(hex);
          gsap.to(mat.color, {
            r: c.r,
            g: c.g,
            b: c.b,
            duration: d || 0.55,
            ease: "power2.out",
            overwrite: "auto",
          });
        }
        function apply3D(patch, animate) {
          if (!animate) {
            applyInstant(patch);
            if (patch.layout) {
              state.layout = patch.layout;
              rebuildBoard();
            }
            if (patch.profile) {
              state.profile = patch.profile;
              buildKeys();
            }
            return;
          }
          if (patch.colorway) {
            const cw = COLORWAYS[patch.colorway];
            tweenColor(matAlpha, cw.a.bg);
            tweenColor(matMod, cw.m.bg);
            tweenColor(matAccent, cw.x.bg);
            gsap.delayedCall(0.26, refreshLegends);
          }
          if (patch.caseColor) tweenColor(matCase, CASES[patch.caseColor].c);
          if (patch.finish) {
            const f = FINISHES[patch.finish];
            gsap.to(matCase, {
              metalness: f.metal,
              roughness: f.rough,
              clearcoat: f.cc,
              duration: 0.5,
            });
          }
          if (patch.plate) tweenColor(matPlate, PLATES[patch.plate].c);
          if (patch.sw) tweenColor(matStem, SWITCHES[patch.sw].dot, 0.4);
          if (patch.material) {
            const m = MATERIALS[patch.material];
            [matAlpha, matMod, matAccent].forEach((mm) => {
              gsap.to(mm, {
                roughness: m.rough,
                clearcoat: m.cc,
                clearcoatRoughness: m.ccr,
                duration: 0.5,
              });
              mm.bumpScale = m.bump;
              mm.envMapIntensity = m.env;
            });
          }
          if (patch.light) applyLight();
          if (patch.extras !== undefined)
            knobGroup.visible = LAYOUTS[state.layout].knob && state.extras.knob;
          if (patch.profile) {
            buildKeys();
            popKeys();
          }
          if (patch.layout) {
            if (state.exploded) setView("3d");
            rebuildBoard();
            popKeys();
          }
        }
        function popKeys() {
          capsGroup.children.forEach((c) => {
            gsap.from(c.position, {
              y: c.userData.baseY + 0.5,
              duration: 0.6,
              ease: "power3.out",
              delay: c.userData.col * 0.008 + c.userData.row * 0.03,
              overwrite: "auto",
            });
          });
        }
        function setState(patch, opts) {
          opts = opts || {};
          if (patch.light)
            patch.light = Object.assign({}, state.light, patch.light);
          if (patch.extras)
            patch.extras = Object.assign({}, state.extras, patch.extras);
          Object.assign(state, patch);
          apply3D(patch, opts.animate !== false);
          syncUI(opts.skipPanel);
        }

        /* ---------------- pricing ---------------- */
        const priceObj = { v: 289 };
        function price() {
          let p =
            LAYOUTS[state.layout].base +
            MATERIALS[state.material].d +
            SWITCHES[state.sw].d +
            PLATES[state.plate].d;
          for (const e in EXTRAS) if (state.extras[e]) p += EXTRAS[e].d;
          return p;
        }
        function syncPrice() {
          gsap.to(priceObj, {
            v: price(),
            duration: 0.55,
            ease: "power2.out",
            overwrite: "auto",
            onUpdate: () => {
              $("priceInt").textContent = Math.round(priceObj.v);
            },
          });
        }

        /* ---------------- UI sync ---------------- */
        function lightDotStyle() {
          if (state.light.mode === "off") return "background:#3f3f45";
          if (state.light.mode === "wave")
            return "background:conic-gradient(#ff5e5e,#ffb35e,#5fd68b,#4ea1ff,#8a7bff,#ff5ea8,#ff5e5e)";
          return "background:" + state.light.color;
        }
        function syncUI(skipPanel) {
          const cw = COLORWAYS[state.colorway];
          $("dotKeycaps").style.background = cw.a.bg;
          $("dotSwitches").style.background = SWITCHES[state.sw].dot;
          $("dotCase").style.background = CASES[state.caseColor].c;
          $("dotPlate").style.background = PLATES[state.plate].c;
          $("dotLight").style.cssText = lightDotStyle();
          $("layoutVal").textContent = LAYOUTS[state.layout].pct;
          document
            .querySelectorAll("#builds .bcard")
            .forEach((b) =>
              b.classList.toggle("on", b.dataset.id === state.selectedPreset),
            );
          syncPrice();
          if (!skipPanel) renderPanel(state.section);
        }

        /* ---------------- right panel ---------------- */
        const PROFILE_ICONS = {
          cherry: "M6 19 L10 9 Q20 6.2 30 9 L34 19 Z",
          oem: "M6 19 L9 7 Q20 4.6 31 7 L34 19 Z",
          xda: "M5 19 L8 10.5 Q20 9 32 10.5 L35 19 Z",
          sa: "M7 19 L10 6 Q20 2.4 30 6 L33 19 Z",
        };
        function chipRow(items, cur, act) {
          return (
            '<div class="rowFlex">' +
            items
              .map(
                ([id, label]) =>
                  `<button class="chip ${cur === id ? "on" : ""}" data-act="${act}" data-v="${id}">${label}</button>`,
              )
              .join("") +
            "</div>"
          );
        }
        function swatchRow(items, cur, act) {
          return (
            '<div class="rowFlex">' +
            items
              .map(
                ([id, c1, c2, title]) =>
                  `<button class="sw ${cur === id ? "on" : ""}" data-act="${act}" data-v="${id}" title="${title || ""}" style="background:linear-gradient(135deg,${c1} 50%,${c2} 50%)"></button>`,
              )
              .join("") +
            "</div>"
          );
        }
        const PANELS = {
          layout() {
            return (
              '<div class="grp"><div class="glabel">Size</div>' +
              Object.entries(LAYOUTS)
                .map(([id, L]) => {
                  const n = L.rows().reduce((a, r) => a + r.length, 0);
                  return `<button class="optCard ${state.layout === id ? "on" : ""}" data-act="layout" data-v="${id}">
        <div><div class="t1">${L.name}</div><div class="t2">${n} keys · ${L.tag}</div></div>
        <div class="pr">$${L.base + (L.knob ? EXTRAS.knob.d : 0)}</div></button>`;
                })
                .join("") +
              '</div><div class="hint">Switching size rebuilds the board live. The knob is exclusive to 75%.</div>'
            );
          },
          keycaps() {
            const cw = COLORWAYS[state.colorway];
            const prof =
              '<div class="rowFlex">' +
              Object.entries(PROFILES)
                .map(
                  ([id]) =>
                    `<button class="profBtn ${state.profile === id ? "on" : ""}" data-act="profile" data-v="${id}" title="${PROFILES[id].name}">
       <svg width="40" height="24" viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="${PROFILE_ICONS[id]}"/></svg></button>`,
                )
                .join("") +
              "</div>";
            const kcap = (l, c, fg, st) =>
              `<div class="kc" style="background:linear-gradient(180deg,${c},${c});color:${fg};${st}">${l}</div>`;
            return `
      <div class="grp"><div class="glabel">Profile</div>${prof}</div>
      <div class="grp"><div class="glabel">Material</div>${chipRow(
        Object.entries(MATERIALS).map(([id, m]) => [id, m.name]),

      )}</div>
      <div class="grp"><div class="glabel">Colorway</div><div class="gname">${cw.name}</div>
        ${swatchRow(

          ]),
          state.colorway,
          "colorway",
        )}</div>
      <div class="preview">
        ${kcap("Esc", cw.x.bg, cw.x.fg, "width:60px;height:60px;left:36px;top:32px")}
        ${kcap("A", cw.a.bg, cw.a.fg, "width:60px;height:60px;left:158px;top:22px")}
        ${kcap("\u21b5 Enter", cw.x.bg, cw.x.fg, "width:106px;height:60px;left:28px;top:112px")}
        ${kcap("Fn", cw.m.bg, cw.m.fg, "width:60px;height:60px;left:172px;top:118px")}
      </div>
      <button class="libBtn" data-act="library">View Keycap Library
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></button>`;
          },
          switches() {
            return (
              '<div class="grp"><div class="glabel">Switch type</div>' +
              Object.entries(SWITCHES)
                .map(
                  ([id, s]) =>
                    `<button class="optCard ${state.sw === id ? "on" : ""}" data-act="sw" data-v="${id}">
        <span class="cdot" style="background:${s.dot}"></span>
        <div><div class="t1">${s.name}</div><div class="t2">${s.type} · ${s.force} actuation</div></div>
        <div class="pr">${s.d === 0 ? "Included" : s.d > 0 ? "+$" + s.d : "\u2212$" + -s.d}</div></button>`,
                )
                .join("") +
              '</div><div class="hint">Click any key on the board to hear the selected switch. Open Explode view to see the stems.</div>'
            );
          },
          case() {
            return `<div class="grp"><div class="glabel">Color</div>
      ${swatchRow(
        Object.entries(CASES).map(([id, c]) => [id, c.c, c.c, c.name]),
        state.caseColor,
        "caseColor",
      )}
      <div class="gname" style="margin-top:10px">${CASES[state.caseColor].name}</div></div>
      <div class="grp"><div class="glabel">Finish</div>${chipRow(
        Object.entries(FINISHES).map(([id, f]) => [id, f.name]),
        state.finish,
        "finish",
      )}</div>
      <div class="hint">CNC machined 6063 aluminum, ${FINISHES[state.finish].name.toLowerCase()} finish.</div>`;
          },
          plate() {
            return (
              '<div class="grp"><div class="glabel">Plate material</div>' +
              Object.entries(PLATES)
                .map(
                  ([id, p]) =>
                    `<button class="optCard ${state.plate === id ? "on" : ""}" data-act="plate" data-v="${id}">
        <span class="cdot" style="background:${p.c}"></span>
        <div><div class="t1">${p.name}</div><div class="t2">${p.tag}</div></div>
        <div class="pr">${p.d === 0 ? "Included" : "+$" + p.d}</div></button>`,
                )
                .join("") +
              '</div><div class="hint">The plate sits inside the case. Switch to Explode view to see it.</div>'
            );
          },
          lighting() {
            const modes = [
              ["wave", "Wave"],
              ["static", "Static"],
              ["breathe", "Breathe"],
              ["off", "Off"],
            ];
            return `<div class="grp"><div class="glabel">Mode</div>${chipRow(modes, state.light.mode, "lmode")}</div>
      <div class="grp"><div class="glabel">Color</div>
      ${swatchRow(
        LIGHT_COLORS.map((c) => [c, c, c, c]),
        state.light.color,
        "lcolor",
      )}</div>
      <div class="grp"><div class="glabel">Brightness</div>
      <input type="range" class="slider" id="brightSlider" min="0.1" max="1.5" step="0.01" value="${state.light.bright}"></div>
      <div class="hint">Tip: drag the rotary knob on the board left or right to set brightness by hand.</div>`;
          },
          extras() {
            return (
              '<div class="grp">' +
              Object.entries(EXTRAS)
                .map(
                  ([id, e]) =>
                    `<div class="togRow"><div><div class="t1">${e.name}</div><div class="t2">${e.tag} · +$${e.d}</div></div>
       <button class="tog ${state.extras[id] ? "on" : ""}" data-act="extra" data-v="${id}"></button></div>`,
                )
                .join("") +
              "</div>" +
              '<div class="hint">Accessories ship alongside the board. The knob is fitted at the factory.</div>'
            );
          },
        };
        const SECTION_TITLES = {
          layout: "LAYOUT",
          keycaps: "KEYCAPS",
          switches: "SWITCHES",
          case: "CASE",
          plate: "PLATE",
          lighting: "LIGHTING",
          extras: "EXTRAS",
        };
        function renderPanel(sec) {
          state.section = sec;
          $("panelTitle").textContent = SECTION_TITLES[sec];
          $("panelBody").innerHTML = PANELS[sec]();

            .querySelectorAll("#snav button")
            .forEach((b) => b.classList.toggle("on", b.dataset.sec === sec));

            sl.addEventListener("input", () => {
              setState(
                { light: { bright: parseFloat(sl.value) } },
                { animate: false, skipPanel: true },
              );
            });
        }
        $("panelBody").addEventListener("click", (ev) => {
          const b = ev.target.closest("[data-act]");

          const v = b.dataset.v;
          switch (b.dataset.act) {
            case "profile":
              setState({ profile: v });
              break;
            case "material":
              setState({ material: v });
              break;
            case "colorway":
              setState({ colorway: v, selectedPreset: null });
              break;
            case "layout":
              setState({ layout: v, selectedPreset: null });
              break;
            case "sw":
              setState({ sw: v, selectedPreset: null });
              playSwitch(SWITCHES[v].sound);
              break;
            case "caseColor":
              setState({ caseColor: v, selectedPreset: null });
              break;
            case "finish":
              setState({ finish: v });
              break;
            case "plate":
              setState({ plate: v });
              break;
            case "lmode":
              setState({ light: { mode: v }, selectedPreset: null });
              break;
            case "lcolor":
              setState({
                light: {
                  color: v,
                  mode:
                    state.light.mode === "wave" ? "static" : state.light.mode,
                },
              });
              break;
            case "extra":
              {
                const e = {};
                e[v] = !state.extras[v];
                setState({ extras: e });
              }
              break;
            case "library":

              break;

        });
        $("snav").addEventListener("click", (ev) => {
          const b = ev.target.closest("button");

            { opacity: 0, y: 8 },

          renderPanel(b.dataset.sec);
        });

        /* ---------------- featured builds ---------------- */
        function presetPatch(p) {

            caseColor: p.s.caseColor,

        function renderBuilds() {

            (p) => `
    <button class="bcard ${state.selectedPreset === p.id ? "on" : ""}" data-id="${p.id}">
      <span class="chk"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5L19.5 7"/></svg></span>
      <div class="img"><img src="${thumbs[p.id] || ""}" alt="${p.name}"></div>

        });

        /* ---------------- toast / modal / drawer ---------------- */

            .timeline()
            .to(t, {
              opacity: 1,
              y: 0,
              duration: 0.28,
              ease: "power2.out",

        function openModal(title, html) {

        function renderCart() {

      <div class="pr">$${it.price}.00</div>
      <button class="rm" data-i="${i}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6.5 7l1 12.2a1.8 1.8 0 001.8 1.8h5.4a1.8 1.8 0 001.8-1.8L17.5 7"/></svg></button>

        });

        /* ---------------- top nav + overlays ---------------- */
        function syncNav(id) {
          document
            .querySelectorAll("#tnav button")
            .forEach((b) => b.classList.toggle("on", b.dataset.nav === id));
        }
        function openLibrary() {
          syncNav("keycaps");
          openModal(
            "Keycap Library",
            '<div class="libGrid">' +
              Object.entries(COLORWAYS)
                .map(
                  ([id, c]) => `
    <button class="libCard ${state.colorway === id ? "on" : ""}" data-lib="${id}">
      <div class="libCaps"><span style="background:${c.a.bg}"></span><span style="background:${c.m.bg}"></span><span style="background:${c.x.bg}"></span></div>
      <div class="nm">${c.name}</div><div class="tg">${c.tag} \u00b7 Doubleshot</div>
    </button>`,
                )
                .join("") +
              "</div>",
          );
        }
        function openGallery() {
          syncNav("gallery");
          let html =
            '<div class="secTitle">FEATURED</div><div class="galGrid">' +
            PRESETS.map(
              (p) => `
    <button class="galCard" data-gal="${p.id}"><img src="${thumbs[p.id] || ""}" alt="">
      <div class="cap"><div class="nm">${p.name}</div><div class="tg">${COLORWAYS[p.s.colorway].name}</div></div></button>`,
            ).join("") +
            "</div>";
          if (savedBuilds.length) {
            html +=
              '<div class="secTitle">YOUR BUILDS</div><div class="galGrid">' +
              savedBuilds
                .map(
                  (b, i) => `
      <button class="galCard" data-saved="${i}"><img src="${b.img}" alt="">
        <div class="cap"><div class="nm">${b.name}</div><div class="tg">${COLORWAYS[b.snap.colorway].name}</div></div></button>`,
                )
                .join("") +
              "</div>";
          }
          openModal("Gallery", html);
        }
        function openSwitchesModal() {
          syncNav("switches");
          openModal(
            "Switches",
            '<div class="libGrid">' +
              Object.entries(SWITCHES)
                .map(
                  ([id, s]) => `
    <button class="libCard ${state.sw === id ? "on" : ""}" data-swm="${id}">
      <div class="libCaps"><span style="background:${s.dot}"></span></div>
      <div class="nm">${s.name}</div><div class="tg">${s.type} \u00b7 ${s.force} \u00b7 ${s.d === 0 ? "Included" : s.d > 0 ? "+$" + s.d : "\u2212$" + -s.d}</div>
    </button>`,
                )
                .join("") +
              '</div><div class="hint" style="margin-top:14px">Selecting a switch updates the live build. Click any key on the board to hear it.</div>',
          );
        }
        function openAccessories() {
          syncNav("accessories");
          openModal(
            "Accessories",
            '<div class="libGrid">' +
              Object.entries(EXTRAS)
                .map(
                  ([id, e]) => `
    <button class="libCard ${state.extras[id] ? "on" : ""}" data-ext="${id}">
      <div class="nm">${e.name}</div><div class="tg">${e.tag}</div>
      <div class="nm" style="margin-top:8px">+$${e.d}</div>
    </button>`,
                )
                .join("") +
              "</div>",
          );
        }
        $("tnav").addEventListener("click", (ev) => {
          const b = ev.target.closest("button");
          if (!b) return;
          const id = b.dataset.nav;
          if (id === "builder") {
            closeModal();
            return;
          }
          if (id === "gallery") openGallery();
          if (id === "keycaps") openLibrary();
          if (id === "switches") openSwitchesModal();
          if (id === "accessories") openAccessories();
        });
        $("modalBody").addEventListener("click", (ev) => {
          const lib = ev.target.closest("[data-lib]");
          if (lib) {
            setState({ colorway: lib.dataset.lib, selectedPreset: null });
            openLibrary();
            toast(COLORWAYS[lib.dataset.lib].name + " applied");
            return;
          }
          const gal = ev.target.closest("[data-gal]");
          if (gal) {
            const p = PRESETS.find((x) => x.id === gal.dataset.gal);
            setState(presetPatch(p));
            closeModal();
            toast(p.name + " loaded");
            return;
          }
          const sv = ev.target.closest("[data-saved]");
          if (sv) {
            const b = savedBuilds[parseInt(sv.dataset.saved)];
            if (b.layout !== state.layout) setState({ layout: b.layout });
            setState(Object.assign({}, b.snap, { selectedPreset: null }));
            closeModal();
            toast(b.name + " loaded");
            return;
          }
          const swm = ev.target.closest("[data-swm]");
          if (swm) {
            setState({ sw: swm.dataset.swm, selectedPreset: null });
            playSwitch(SWITCHES[swm.dataset.swm].sound);
            openSwitchesModal();
            return;
          }
          const ext = ev.target.closest("[data-ext]");
          if (ext) {
            const e = {};
            e[ext.dataset.ext] = !state.extras[ext.dataset.ext];
            setState({ extras: e });
            openAccessories();
            return;
          }
        });

        /* account menu */
        $("acctBtn").addEventListener("click", (ev) => {
          ev.stopPropagation();
          $("acctMenu").classList.toggle("open");
        });
        document.addEventListener("click", (ev) => {
          if (!ev.target.closest("#acctMenu"))
            $("acctMenu").classList.remove("open");
        });
        $("acctMenu").addEventListener("click", (ev) => {
          const b = ev.target.closest("[data-acct]");
          if (!b) return;
          $("acctMenu").classList.remove("open");
          toast(
            {
              profile: "Profile settings coming to your account page",
              orders: "You have 2 items in your cart and 0 past orders",
              signout: "Signed out of studio@modkeys.co",
            }[b.dataset.acct],
          );
        });

        /* theme */
        $("themeBtn").addEventListener("click", () => {
          state.theme = state.theme === "light" ? "dark" : "light";
          document.documentElement.dataset.theme = state.theme;
          const dark = state.theme === "dark";
          $("sunIc").style.display = dark ? "none" : "block";
          $("moonIc").style.display = dark ? "block" : "none";
          hemi.intensity = dark ? 0.5 : 0.62;
          key.intensity = dark ? 0.32 : 0.4;
          shadowPlane.material.opacity = dark ? 0.3 : 0.16;
          renderer.toneMappingExposure = dark ? 0.92 : 1.0;
        });

        /* ---------------- switch sounds (synthesized) ---------------- */
        let AC = null;
        function playSwitch(type) {
          try {
            AC = AC || new (window.AudioContext || window.webkitAudioContext)();
            if (AC.state === "suspended") AC.resume();
            const t = AC.currentTime;
            const cfg = {
              thock: [95, 0.1, 0.13],
              tactile: [135, 0.08, 0.11],
              clicky: [1750, 0.03, 0.09],
              silent: [72, 0.06, 0.05],
            }[type] || [120, 0.07, 0.1];
            const g = AC.createGain();
            g.connect(AC.destination);
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(cfg[2], t + 0.005);
            g.gain.exponentialRampToValueAtTime(0.0001, t + cfg[1] + 0.06);
            const o = AC.createOscillator();
            o.type = type === "clicky" ? "square" : "sine";
            o.frequency.setValueAtTime(cfg[0], t);
            o.frequency.exponentialRampToValueAtTime(
              Math.max(40, cfg[0] * 0.45),
              t + cfg[1],
            );
            o.connect(g);
            o.start(t);
            o.stop(t + cfg[1] + 0.08);
            const nb = AC.createBuffer(1, 2205, 44100),
              d = nb.getChannelData(0);
            for (let i = 0; i < d.length; i++)
              d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2);
            const ns = AC.createBufferSource();
            ns.buffer = nb;
            const nf = AC.createBiquadFilter();
            nf.type = "lowpass";
            nf.frequency.value =
              type === "clicky" ? 6500 : type === "silent" ? 450 : 1100;
            const ng = AC.createGain();
            ng.gain.value = type === "silent" ? 0.015 : 0.05;
            ns.connect(nf);
            nf.connect(ng);
            ng.connect(AC.destination);
            ns.start(t);
          } catch (e) {}
        }

        /* ---------------- boot ---------------- */
        rebuildBoard();
        applyLight();
        resize();
        ctrl.apply();
        tick();
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            genThumbs();
            renderBuilds();
            renderPanel("keycaps");
            syncUI();
            setView("3d");
            gsap.from(root.scale, {
              x: KB_SCALE * 0.9,
              y: KB_SCALE * 0.9,
              z: KB_SCALE * 0.9,
              duration: 1.1,
              ease: "power3.out",
            });
            gsap.from(root.rotation, {
              y: -0.4,
              duration: 1.3,
              ease: "power3.out",
            });
            gsap.to($("loader"), {
              opacity: 0,
              duration: 0.5,
              delay: 0.15,
              onComplete: () => $("loader").remove(),
            });
          });
        });
      })();
    </script>
  </body>
</html>
